name: docs-drift

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'apps/**'
      - 'packages/**'
      - 'scripts/verify-doc-refs.ts'
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'apps/**'
      - 'packages/**'
      - 'scripts/verify-doc-refs.ts'

concurrency:
  group: docs-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify docs refs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify docs refs
        run: pnpm verify:docs
