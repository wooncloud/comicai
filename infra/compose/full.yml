name: comicai

# 전체 스택을 컨테이너로 띄우는 compose.
# 사용:
#   docker compose -f infra/compose/full.yml up -d --build
#
# 인프라만 띄우고 앱은 로컬 pnpm dev로 돌리려면 dev.yml 사용.

x-db-env: &db-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-comicai}:${POSTGRES_PASSWORD:-comicai}@postgres:5432/${POSTGRES_DB:-comicai}?schema=public

x-s3-env: &s3-env
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: ${S3_BUCKET:-comicai}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}

x-api-env: &api-env
  <<: [*db-env, *s3-env]
  NODE_ENV: production
  REDIS_URL: redis://redis:6379
  MASTER_KEY: ${MASTER_KEY:?MASTER_KEY 필수 — .env에 설정하세요}

services:
  postgres:
    image: postgres:16
    container_name: comicai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-comicai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comicai}
      POSTGRES_DB: ${POSTGRES_DB:-comicai}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comicai}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: comicai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: comicai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: comicai-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *db-env
    entrypoint: ["sh", "-c"]
    command: ["cd packages/db && npx prisma migrate deploy"]
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: comicai-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *api-env
      API_PORT: 4000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-}
      RENDER_WORKER_DISABLED: "1"
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: comicai-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *api-env
      RENDER_WORKER_DISABLED: "0"
      RENDER_CONCURRENCY: ${RENDER_CONCURRENCY:-2}
    command: ["node", "apps/api/dist/worker.js"]

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: comicai-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"

  # Cloudflare Zero Trust Tunnel — profile=tunnel로 활성화.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: comicai-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN 필수}
    depends_on:
      - web
      - api

  # 일일 백업 — profile=backup으로 활성화.
  backup:
    build:
      context: ../backup
    container_name: comicai-backup
    restart: unless-stopped
    profiles: ["backup"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *s3-env
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-comicai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comicai}
      POSTGRES_DB: ${POSTGRES_DB:-comicai}
      BACKUP_DIR: /backup
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}
      RUN_ON_START: ${BACKUP_RUN_ON_START:-0}
    volumes:
      - backup_data:/backup

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backup_data:
